<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genç Yazarlar Haber Merkezi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-header">
    <img src="okul-logo-png.jpeg" alt="British Town Logo" class="ana-logo">
    <h1>Genç Yazarlar Haber Merkezi</h1>
    <p>Geleceğin gazetecileri burada yetişiyor!</p>
</header>

<nav class="category-nav">
    <button onclick="kategoriFiltrele('Hepsi')">Hepsi</button>
    <button onclick="kategoriFiltrele('Gündem')">Gündem</button>
    <button onclick="kategoriFiltrele('Spor')">Spor</button>
    <button onclick="kategoriFiltrele('Sanat')">Sanat</button>
</nav>

<div class="container">
    <aside class="sidebar">
        <div class="sidebar-widget">
            <h4 id="tarih-saat">Tarih Yükleniyor...</h4>
            <p>☁️ Parçalı Bulutlu, 16°C</p>
        </div>

        <div class="sidebar-widget">
            <h4>🔥 En Çok Okunanlar</h4>
          <ul id="en-cok-okunanlar">
    </ul>
        </div>

   <div class="admin-gizli-giris" onclick="adminPaneliniGoster()">
    <span style="cursor: pointer; font-size: 20px;">🔒</span>
</div>

<div id="admin-modal" class="modal-arkaplan">
    <div class="modal-icerik">
        <span class="kapat-buton" onclick="adminPaneliniKapat()">&times;</span>
        <h4>🔐 Yönetici Girişi</h4>
        <div id="admin-giris">
            <input type="password" id="admin-sifre" placeholder="Şifre">
            <button onclick="paneliAc()">Giriş Yap</button>
        </div>
        
        <div id="haber-editoru" style="display:none;">
            </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
