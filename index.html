<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genç Yazarlar Haber Merkezi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-header">
    <img src="okul-logo-png.jpeg" alt="British Town Logo" class="ana-logo">
    <h1>Genç Yazarlar Haber Merkezi</h1>
    <p>Geleceğin gazetecileri burada yetişiyor!</p>
</header>

<nav class="category-nav">
    <button onclick="kategoriFiltrele('Hepsi')">Hepsi</button>
    <button onclick="kategoriFiltrele('Gündem')">Gündem</button>
    <button onclick="kategoriFiltrele('Spor')">Spor</button>
    <button onclick="kategoriFiltrele('Sanat')">Sanat</button>
</nav>

<div class="container">
    <aside class="sidebar">
        <div class="sidebar-widget">
            <h4 id="tarih-saat">Tarih Yükleniyor...</h4>
            <p>☁️ Parçalı Bulutlu, 16°C</p>
        </div>

        <div class="sidebar-widget">
            <h4>🔥 En Çok Okunanlar</h4>
            <ul id="en-cok-okunanlar">
                <li>• Yapay Zeka ve Gelecek</li>
                <li>• Genç Yazarlar Buluşuyor</li>
                <li>• Okul Gazetemiz Yayında!</li>
            </ul>
        </div>

        <div class="sidebar-widget" id="admin-panel">
            <h4>🔐 Yönetici Girişi</h4>
            <div id="admin-giris">
                <input type="password" id="admin-sifre" placeholder="Şifre">
                <button onclick="paneliAc()" style="width: 100%; padding: 10px; background: #1a4a8e; color: white; border: none; border-radius: 8px; cursor: pointer;">Giriş</button>
            </div>
            
            <div id="haber-editoru" style="display:none;">
                <form id="haber-formu">
                    <input type="text" id="h-baslik" placeholder="Haber Başlığı" required>
                    <input type="text" id="h-yazar" placeholder="Yazar Adı" required>
                    <select id="h-kategori">
                        <option value="Gündem">Gündem</option>
                        <option value="Spor">Spor</option>
                        <option value="Sanat">Sanat</option>
                    </select>
                    <label style="font-size: 12px; display: block; margin-top: 10px;">Haber Resmi:</label>
                    <input type="file" id="h-resim" required>
                    <label style="font-size: 12px; display: block; margin-top: 10px;">Yazar Resmi:</label>
                    <input type="file" id="h-yazar-resim">
                    <textarea id="h-icerik" placeholder="Haber içeriğini buraya yazın..." required style="width: 100%; height: 80px; margin-top: 10px; border-radius: 8px; padding: 5px;"></textarea>
                    <button type="submit" style="width: 100%; padding: 10px; background: #d32f2f; color: white; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer;">Yayınla</button>
                </form>
            </div>
        </div>
    </aside>

    <main class="news-feed" id="haber-listesi">
        </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
